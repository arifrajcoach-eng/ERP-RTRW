name: SmartRW AI - Automated Security & Compliance Auditor (Claude Code with OpenRouter)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ai_audit:
    name: Claude Code Security compliance check (via OpenRouter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Start Proxy and Run Claude Code Auditor
        # Clones the popular elusznik/open-claude-router to act as a local proxy
        # translating Claude Code's Anthropic requests into OpenRouter-compatible format.
        # Spawning and running this in the same step guarantees the background process is kept alive.
        run: |
          git clone https://github.com/elusznik/open-claude-router.git proxy
          cd proxy
          npm install
          
          # Configure secrets and parameters
          # Using "google/gemini-2.5-flash" via OpenRouter for extremely fast, ultra-low cost, and token-saving audits.
          echo "OPENROUTER_API_KEY=\"${{ secrets.OPENROUTER_API_KEY }}\"" > .dev.vars
          echo "MODEL_OVERRIDE=\"google/gemini-2.5-flash\"" >> .dev.vars
          
          # Start wrangler locally on port 8787 in the background
          # Using nohup guarantees the process is detached and doesn't capture terminal output
          nohup npx wrangler dev --port 8787 --ip 127.0.0.1 > wrangler.log 2>&1 &
          
          # Wait up to 30 seconds for the proxy to become available
          echo "Waiting for local Claude-to-OpenRouter proxy to boot..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8787 >/dev/null; then
              echo "Proxy booted successfully on http://127.0.0.1:8787!"
              break
            fi
            sleep 1
          done
          
          # Move back to project root
          cd ..
          
          # Run Claude Code with the custom base URL pointing to our background proxy
          # Using the `--once` flag keeps execution linear and prevents CLI from hanging in CI/CD pipeline
          export ANTHROPIC_BASE_URL="http://127.0.0.1:8787"
          export ANTHROPIC_API_KEY="dummy-key-to-bypass-sdk-checks"
          npx @anthropic-ai/claude-code --once "jalankan audit keamanan sesuai AGENTS.md"

      - name: Send Telegram Notification (Guardian Security Audit)
        if: always() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="🟢"
            TEXT_STATUS="SUKSES - Tidak ada ancaman kebocoran data terdeteksi!"
          elif [ "$STATUS" = "failure" ]; then
            COLOR="🔴"
            TEXT_STATUS="PERINGATAN - Ada masalah keamanan/kegagalan terdeteksi!"
          else
            COLOR="🟡"
            TEXT_STATUS="DIBATALKAN"
          fi

          MESSAGE="$COLOR *[SmartRW AI] Laporan Guardian Nightly* %0A%0A📌 *Status:* $TEXT_STATUS %0A📌 *Pemicu:* ${{ github.event_name }} oleh ${{ github.actor }} %0A📌 *Komit:* \`${{ github.sha }}\` %0A%0A🔗 [Klik untuk Lihat Log Kegiatan Audit di GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"


