name: SmartRW AI - Automated Security & Compliance Auditor (Claude Code with OpenRouter)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  ai_audit:
    name: Claude Code Security compliance check (via OpenRouter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Set up and Start OpenRouter to Claude API Proxy
        # Clones the popular elusznik/open-claude-router to act as a local proxy
        # translating Claude Code's Anthropic requests into OpenRouter-compatible format.
        run: |
          git clone https://github.com/elusznik/open-claude-router.git proxy
          cd proxy
          npm install
          
          # Configure secrets and parameters
          # You can override MODEL_OVERRIDE with "google/gemini-2.5-pro", "meta-llama/llama-3.3-70b-instruct", etc.
          # We default to "anthropic/claude-3.5-sonnet" (runs via OpenRouter) for best Claude Code compliance.
          echo "OPENROUTER_API_KEY=\"${{ secrets.OPENROUTER_API_KEY }}\"" > .dev.vars
          echo "MODEL_OVERRIDE=\"anthropic/claude-3.5-sonnet\"" >> .dev.vars
          
          # Start local Cloudflare worker proxy in background on port 8787
          npx wrangler dev --port 8787 --ip 127.0.0.1 &
          
          # Wait for the proxy to become available
          echo "Waiting for local Claude-to-OpenRouter proxy to boot..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8787 >/dev/null; then
              echo "Proxy booted successfully!"
              exit 0
            fi
            sleep 1
          done
          echo "Error: Proxy failed to start on time."
          exit 1

      - name: Run Claude Code Security Auditor (Non-Interactive)
        # Point Claude Code to our local OpenRouter proxy instead of direct Anthropic API.
        # This keeps the execution linear, utilizing OpenRouter budget and free options.
        run: npx @anthropic-ai/claude-code --once "jalankan audit keamanan sesuai AGENTS.md"
        env:
          ANTHROPIC_BASE_URL: "http://127.0.0.1:8787"
          ANTHROPIC_API_KEY: "dummy-key-to-bypass-sdk-checks"

