name: SmartRW AI - Automated QC Code Verification

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Lint, Test, and Build Sanity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Run Linter (TypeScript Type-Checks)
        run: npm run lint

      - name: Execute Tenant & Architecture Safeguard Checks (Automated Test)
        run: npm run verify

      - name: Run Production Compiler Verification (Build Applet)
        run: npm run build

      - name: Send Telegram Notification (Code Quality Verification)
        if: always() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="🟢"
            TEXT_STATUS="SUKSES - Kualitas kode bersih, linter lolos, & build aman!"
          elif [ "$STATUS" = "failure" ]; then
            COLOR="🔴"
            TEXT_STATUS="GAGAL - Ada eror tipe data (TypeScript) atau lint pada komit terbaru!"
          else
            COLOR="🟡"
            TEXT_STATUS="DIBATALKAN"
          fi

          MESSAGE="$COLOR *[SmartRW AI] Verifikasi Kualitas Kode (CI)* %0A%0A📌 *Status:* $TEXT_STATUS %0A📌 *Pemicu:* ${{ github.event_name }} oleh ${{ github.actor }} %0A📌 *Komit:* \`${{ github.sha }}\` %0A%0A🔗 [Klik untuk Detil Verifikasi di GitHub](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"

