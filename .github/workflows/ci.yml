# ═══════════════════════════════════════════════════════════════
# SmartRW AI — CI Pipeline (Quality Gate)
# Jalan setiap push & pull request ke main/master
# Blokir merge jika ada CRITICAL atau build gagal
# ═══════════════════════════════════════════════════════════════
name: SmartRW AI — CI Quality Gate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    name: 🔒 Security + Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 TypeScript Type Check
        run: npm run lint

      - name: 🛡️ Security Verification
        id: verify
        run: npm run verify

      - name: 🏗️ Production Build
        run: npm run build

      - name: 📁 Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-audit-${{ github.run_number }}
          path: audit-report.json
          retention-days: 7

      - name: 💬 Komentar PR jika Ada Temuan
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '## ❌ SmartRW AI Quality Gate — GAGAL\n\n';
            try {
              const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
              body += `| Severity | Jumlah |\n|----------|--------|\n`;
              body += `| 🔴 CRITICAL | ${report.summary.critical} |\n`;
              body += `| 🟠 HIGH | ${report.summary.high} |\n`;
              body += `| ✅ PASSED | ${report.summary.passed} |\n\n`;
              if (report.critical.length > 0) {
                body += '### 🔴 Temuan CRITICAL\n';
                report.critical.forEach(f => {
                  body += `- **${f.rule}**\n  \`${f.file.replace(process.cwd(),'').replace('/home/runner/work/ERP-RTRW/ERP-RTRW/','')}\`\n`;
                });
              }
              body += '\n**PR ini tidak bisa di-merge sampai semua temuan CRITICAL diperbaiki.**';
            } catch(e) {
              body += 'Gagal membaca audit report. Cek logs untuk detail.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
